{% extends "template.html" %}

{% block conteudo %}
<div class="card" style="margin-top: 10px; margin-bottom: 30px;">
    
    <div style="margin-bottom: 25px; padding: 0 5px;">
        <h2 style="font-size: 1.5rem; color: var(--texto-escuro);">Nova Avaliação</h2>
        <p style="color: var(--texto-mutado); font-size: 0.85rem;">Preencha os dados do equipamento abaixo</p>
    </div>

    <form method="POST" action="#">
        
        <div class="form-group">
            <label for="rings_id">3 Números finais</label>
            <input type="number" required min="100" max="999" id="ring_n" name="ring_n" placeholder="Ex:000">
        </div>

        <div class="form-group">
            <label for="nota">Nota do Equipamento (1 a 10)</label>
            <div style="position: relative; display: flex; align-items: center;">
                <input type="number" id="nota" name="nota" placeholder="Digite uma nota de 1 a 10" required min="1" max="10" style="padding-left: 40px;">
                <i class="fa-solid fa-star" style="position: absolute; left: 15px; color: #eab308; font-size: 1.1rem;"></i>
            </div>
            
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label for="comentario">Comentários / Observações</label>
            <textarea id="comentario" name="comentario" rows="4" required placeholder="Descreva as condições do ring, problemas encontrados ou observações gerais..." style="width: 100%; padding: 12px; border: 1px solid var(--borda); border-radius: 8px; font-family: inherit; font-size: 0.95rem; resize: none; outline: none; box-sizing: border-box;"></textarea>
        </div>

        <div style="display: flex; gap: 12px;">
            <a href="{{ url_for('rings') }}" style="flex: 1; text-align: center; padding: 14px; border: 1px solid var(--borda); border-radius: 8px; color: var(--texto-escuro); font-weight: 600; text-decoration: none; font-size: 0.95rem; background-color: #f8fafc;">
                Cancelar
            </a>
            
            <button type="submit" style="flex: 2; margin-top: 0;">
                <i class="fa-solid fa-floppy-disk" style="margin-right: 6px;"></i> Salvar Avaliação
            </button>
        </div>

    </form>
</div>
{% endblock %}
